# ============================================================
# Egern Profile - 签到脚本配置
# 包含：晓晓优选 / 歪麦霸王餐 / 小蚕霸王餐
# ============================================================

http_port: 3080
socks_port: 3090
ipv6: false
allow_external_connections: false

# ============================================================
# MITM 解密配置
# 步骤：Egern → 设置 → MITM → 生成证书 → 安装到设备并信任
# 生成证书后 Egern 会自动填充 ca_p12 / ca_passphrase
# ============================================================
mitm:
  ca_p12: ""
  ca_passphrase: ""
  hostnames:
    includes:
      - "xxyx-client-api.xiaoxiaoyouxuan.com"   # 晓晓优选
      - "wmapp-api.waimaimingtang.com"           # 歪麦霸王餐
      - "gw.xiaocantech.com"                     # 小蚕霸王餐

# ============================================================
# 脚本配置
# ============================================================
scriptings:

  # ------------------------------------------------------------
  # 晓晓优选（原生 Egern 脚本，无需兼容层）
  # ------------------------------------------------------------
  # 步骤一：打开 App → 进入「我的」页面 → 自动抓取 Token
  - http_request:
      name: 晓晓优选-抓取Token
      match: "^https://xxyx-client-api\\.xiaoxiaoyouxuan\\.com/my"
      script_url: "https://raw.githubusercontent.com/kiarimovv/script/main/xxyx.js"
      update_interval: 86400
      timeout: 60
      body_required: false

  # 步骤二：每天 08:00 定时签到（Token 抓取后自动生效，无需设置 env）
  - schedule:
      name: 晓晓优选-定时签到
      cron: "0 8 * * *"
      script_url: "https://raw.githubusercontent.com/kiarimovv/script/main/xxyx.js"
      update_interval: 86400
      timeout: 60

  # ------------------------------------------------------------
  # 歪麦霸王餐（Surge 兼容层包装，动态加载原始脚本）
  # ------------------------------------------------------------
  # 步骤一：打开 App → 进入「我的」页面 → 自动抓取凭证
  - http_request:
      name: 歪麦霸王餐-拦截
      match: "^https://wmapp-api\\.waimaimingtang\\.com/api/api/v2/user/api_user_info_one"
      script_url: "https://raw.githubusercontent.com/kiarimovv/script/main/wmbwc.js"
      update_interval: 86400
      timeout: 60
      body_required: true

  # 步骤二：每天 08:30 定时执行（抓包成功后自动生效）
  - schedule:
      name: 歪麦霸王餐-定时签到
      cron: "30 8 * * *"
      script_url: "https://raw.githubusercontent.com/kiarimovv/script/main/wmbwc.js"
      update_interval: 86400
      timeout: 60

  # ------------------------------------------------------------
  # 小蚕霸王餐（Surge 兼容层包装，动态加载原始脚本）
  # ------------------------------------------------------------
  # 步骤一：打开 App → 自动触发，获取 Token 后及时关闭 App
  - http_response:
      name: 小蚕霸王餐-拦截
      match: "^https://gw\\.xiaocantech\\.com/rpc"
      script_url: "https://raw.githubusercontent.com/kiarimovv/script/main/xcbwc.js"
      update_interval: 86400
      timeout: 60
      body_required: true

  # 步骤二：每天 09:00 定时执行（抓包成功后自动生效）
  - schedule:
      name: 小蚕霸王餐-定时签到
      cron: "0 9 * * *"
      script_url: "https://raw.githubusercontent.com/kiarimovv/script/main/xcbwc.js"
      update_interval: 86400
      timeout: 60

http_captures:
  - "xxyx-client-api.xiaoxiaoyouxuan.com"
  - "wmapp-api.waimaimingtang.com"
  - "gw.xiaocantech.com"

# ============================================================
# DNS 配置
# ============================================================
dns:
  bootstrap:
    - system
  upstreams:
    cn:
      - "https://223.5.5.5/dns-query"
      - "https://119.29.29.29/dns-query"
    global:
      - "https://1.1.1.1/dns-query"
      - "https://8.8.8.8/dns-query"
  forward:
    - wildcard:
        match: "*.cn"
        value: cn
    - wildcard:
        match: "*"
        value: global

# ============================================================
# 路由规则（根据你的实际节点修改 policy）
# ============================================================
rules:
  - default:
      policy: DIRECT
